services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ${OLLAMA_MODELS_FOLDER}:/ollama
      - ./ollama_entrypoint.sh:/entrypoint.sh
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    entrypoint: ["/usr/bin/bash", "/entrypoint.sh"]

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # For N8N
      - N8N_SECURE_COOKIE=false
      # For scripts
      - PROJECT_ROOT=${PROJECT_ROOT}
    volumes:
      - ${DATA_FOLDER}:/home/node/.n8n
      - ${KNOWLEDGE_BASE_FOLDER}:/knowledge-base
